<!doctype html>
<html>
  <head>
    <title>Budget Smuggler</title>
    <!-- contents of this file will be placed inside the <head> -->
    <link rel="stylesheet" type="text/css" href="https://fonts.googleapis.com/css?family=Open+Sans" />
    <style>
      * { box-sizing: border-box; }
      body {
        background-color: #f6704b;
        margin: 0;
        padding: 40px 20px;
      }
      .container {
        text-align: center;
      }
      .title {
        background-color: #8e44ad;
        border-radius: 5px 5px 0 0;
        margin: -14px -14px 20px -14px;
        padding: 5px;
        font-size: 24px;
        height: 46px;
        line-height: 46px;
      }
      .title .left {
        float: left;
        width: 20%;
      }
      .title .right {
        float: right;
        width: 20%;
        text-align: right;
      }
      .title .center {
        display: inline-block;
        width: 60%;
      }
      .title h3 {
        text-align: center;
        margin: 0 auto;
      }
      .budget {
        text-align: initial;
        display: inline-block;
        max-width: calc(100vw - 40px);
        padding: 14px;
        margin: 50px 0;
        font-family: "Open Sans", sans-serif;
        background-color: #354b60;
        border-radius: 5px;
        color: white;
        box-shadow: 0 0 40px 5px rgba(0, 0, 0, .4);
        margin: 50px auto;
      }

      /* ---- buttons ---- */
      button {
        background-color: rgba(255, 255, 255, 0.3);
        margin: 4px;
        border-radius: 8px;
        border: none;
        height: 18px;
        width: 20px;
      }
      .edit-button {
        height: 30px;
        width: 50px;
      }
      .year-chooser button {
        height: 30px;
        width: 20px;
        margin: 0;
      }
      .new {
        float: left;
      }

      /* ---- table body: nav col + scrollable data ---- */
      .table-body {
        display: flex;
        border: 1px solid rgba(255,255,255,.1);
        border-radius: 4px;
      }

      /* ---- nav column ---- */
      .nav-col {
        flex: 0 0 200px;
        min-width: 200px;
      }
      .nav-row {
        height: 28px;
        line-height: 28px;
        padding: 0 8px;
        font-size: 13px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        border-bottom: 1px solid rgba(255,255,255,.08);
        border-right: 1px solid rgba(255,255,255,.1);
        text-align: left;
      }
      .nav-col .nav-row:last-child { border-bottom: none; }
      .nav-row.header {
        color: rgba(255, 255, 255, 0.3);
        font-size: 12px;
      }
      .nav-row.indent-cat { padding-left: 20px; }
      .nav-row.indent-ext { padding-left: 34px; }
      .nav-row input {
        width: 100%;
        height: 100%;
        padding: 0;
        border: none;
        font: inherit;
        background-color: inherit;
        color: inherit;
      }

      /* ---- scrollable data ---- */
      .scroll-wrap {
        min-width: 0;
        flex: 1 1 auto;
        overflow-x: auto;
        overflow-y: hidden;
        scroll-snap-type: x mandatory;
        scroll-behavior: smooth;
      }
      .scroll-wrap::-webkit-scrollbar { height: 6px; }
      .scroll-wrap::-webkit-scrollbar-thumb { background: rgba(255,255,255,.3); border-radius: 3px; }

      .data-row {
        display: flex;
        height: 28px;
        line-height: 28px;
        border-bottom: 1px solid rgba(255,255,255,.08);
      }
      .data-row:last-child { border-bottom: none; }
      .data-row.header { color: rgba(255,255,255,.35); }

      ol {
        display: flex;
        margin: 0;
        padding: 0;
        list-style: none;
        flex-shrink: 0;
      }
      li {
        flex-shrink: 0;
        width: 40px;
        min-width: 40px;
        margin: 0 5px;
        text-align: right;
        padding: 0 2px;
        font-size: 12px;
        scroll-snap-align: start;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: clip;
      }
      .header li {
        text-align: center;
        font-size: 11px;
      }
      .header .year-label {
        font-size: 12px;
        color: rgba(255,255,255,.5);
      }
      .data-row input {
        width: 100%;
        height: 100%;
        padding: 0;
        border: none;
        font: inherit;
        background-color: inherit;
        color: inherit;
        text-align: end;
      }
      button.extended, button.total {
        visibility: hidden;
      }
    </style>

  </head>
  <body>
    <script src="index.js"></script>
  </body>
</html>
