<!doctype html>
<html>
  <head>
    <title>Budget Smuggler</title>
    <!-- contents of this file will be placed inside the <head> -->
    <link rel="stylesheet" type="text/css" href="https://fonts.googleapis.com/css?family=Open+Sans" />
    <style>
      body {
        background-color: #f6704b;
      }
      .container {
        text-align: center;
      }
      .nav { 
        padding: 5px 0;
      }
      .title {
        background-color: #8e44ad;
        border-radius: 5px 5px 0 0;
        margin: -14px;
        margin-bottom: 20px; 
        padding: 5px;
        font-size: 24px;
        height: 46px;
        line-height: 46px;
      }
      .title .left {
        float: left;
        width: 20%;
      }
      .title .right {
        float: right;
        width: 20%;
        text-align: right;
      }
      .title .center {
        display: inline-block;
        width: 60%;
      }
      .title h3 {
        text-align: center;
        margin: 0 auto;
      }
      .header {
        color: rgba(255, 255, 255, 0.3);
        border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        margin-bottom: 10px;
      }
      .total .months {
        border-top: 1px solid rgba(0, 0, 0, 0.1);
      }
      .budget {
        text-align: initial;
        display: inline-block;
        padding: 14px;
        margin: 50px auto;
        --width: 82%;
        font-family: "Open Sans";
        background-color: #354b60;
        border-radius: 5px;
        color: white;
        box-shadow: 0 0 40px 5px rgba(0, 0, 0, .4);
      }
      button {
        background-color: rgba(255, 255, 255, 0.3);
        margin: 4px;
        border-radius: 8px;
        border: none;
        height: 18px;
        width: 20px;
      }
      .edit-button {
        height: 30px;
        width: 50px;
      }
      .year-chooser button {
        height: 30px;
        width: 20px;
        margin: 0;
      }
      li {
        display: block;
      }
      .section {
        margin-top: 8px;
        --border: 1px solid red;
      }
      .category {
        --border: 0px solid blue;
      }
      .extended {
        --border: 0px solid grey;
      }
      .months ol {
        display: flex;
        margin: 0;
        padding: 0;
        list-style: none;
      }
      .months li {
        box-sizing: border-box;
        border: 1px solid transparent;
        text-align: right;
        padding: 4px 0;
        margin: 0 5px;
        width: 40px;
      }
      .months li.year-label {
        text-align: center;
        color: rgba(255, 255, 255, 0.5);
      }
      .months {
        overflow: hidden;
      }
      .months ol.slide-f {
        animation: slide-f 0.35s ease-out forwards;
      }
      .months ol.slide-b {
        animation: slide-b 0.35s ease-out forwards;
      }
      @keyframes slide-f {
        from { transform: translateX(0); }
        to { transform: translateX(-600px); }
      }
      @keyframes slide-b {
        from { transform: translateX(-600px); }
        to { transform: translateX(0); }
      }
      .nav {
        display: inline-block;
        width: 200px;
        float: left;
      }
      .category .name {
        margin-left: 7px;
      }
      .extended .name {
        margin-left: 15px;
      }
      .section input {
        width: 100%;
        height: 100%;
        padding: 0;
        border: none;
        font: inherit;
        background-color: inherit;
        color: inherit;
        text-align: end;
      }
      .new {
        float: left;
      }
      button.extended, button.total {
        visibility: hidden;
      }
    </style>

  </head>
  <body>
    <script src="index.js"></script>
  </body>
</html>
