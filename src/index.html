<!doctype html>
<html>
  <head>
    <title>Budget Smuggler</title>
    <!-- contents of this file will be placed inside the <head> -->
    <link rel="stylesheet" type="text/css" href="https://fonts.googleapis.com/css?family=Open+Sans" />
    <style>
      * { box-sizing: border-box; }
      body {
        background-color: #f6704b;
        margin: 0;
        padding: 40px 20px;
        overflow-y: hidden;
      }
      .container {
        text-align: center;
      }
      .title {
        background-color: #8e44ad;
        border-radius: 5px 5px 0 0;
        margin: -14px -14px 20px -14px;
        padding: 0 10px;
        font-size: 20px;
        height: 46px;
        display: flex;
        align-items: center;
      }
      .title .left { flex: 0 0 auto; }
      .title .right { flex: 0 0 auto; margin-left: auto; }
      .title .center { flex: 1 1 auto; text-align: center; }
      .title h3 { margin: 0; font-size: 18px; font-weight: 600; }
      .budget {
        text-align: initial;
        display: inline-block;
        max-width: calc(100vw - 40px);
        padding: 14px;
        margin: 50px 0;
        font-family: "Open Sans", sans-serif;
        background-color: #354b60;
        border-radius: 5px;
        color: white;
        box-shadow: 0 0 40px 5px rgba(0, 0, 0, .4);
        margin: 50px auto;
      }

      /* ---- buttons ---- */
      button {
        background-color: rgba(255, 255, 255, 0.2);
        border: 1px solid rgba(255,255,255,.15);
        border-radius: 6px;
        color: #fff;
        cursor: pointer;
        font-size: 13px;
        transition: background-color .15s;
      }
      button:hover { background-color: rgba(255, 255, 255, 0.35); }
      button:active { background-color: rgba(255, 255, 255, 0.15); }
      .edit-button {
        height: 30px;
        width: 56px;
        font-size: 13px;
        font-weight: 600;
        padding: 0;
      }
      .edit-button.active { background-color: #e67e22; border-color: #d35400; }
      .year-chooser button {
        height: 30px;
        width: 28px;
        margin: 0 1px;
        font-weight: 700;
        font-size: 15px;
      }
      .new {
        margin-bottom: 8px;
      }
      .new button {
        width: 26px;
        height: 26px;
        font-size: 16px;
        font-weight: 700;
        line-height: 0;
      }

      /* ---- table body: nav col + scrollable data ---- */
      .table-body {
        display: flex;
        border: 1px solid rgba(255,255,255,.1);
        border-radius: 4px;
      }

      /* ---- nav column ---- */
      .nav-col {
        flex: 0 0 200px;
        min-width: 200px;
      }
      .nav-row {
        height: 28px;
        line-height: 28px;
        padding: 0 8px;
        font-size: 13px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        border-bottom: 1px solid rgba(255,255,255,.08);
        border-right: 1px solid rgba(255,255,255,.1);
        text-align: left;
        cursor: pointer;
        transition: background-color .1s;
      }
      .nav-row:hover { background-color: rgba(255,255,255,.04); }
      .nav-col .nav-row:last-child { border-bottom: none; }
      .nav-row.header {
        color: rgba(255, 255, 255, 0.25);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: .5px;
        cursor: default;
      }
      .nav-row.header:hover { background-color: transparent; }
      .nav-row.total { border-top: 1px solid rgba(255,255,255,.15) !important; font-weight: 600; }
      .nav-row.indent-cat {
        padding-left: 18px;
        border-left: 2px solid rgba(230,126,34,.4);
        font-size: 12px;
        color: rgba(255,255,255,.75);
      }
      .nav-row.indent-ext {
        padding-left: 32px;
        border-left: 2px solid rgba(46,204,113,.3);
        font-size: 12px;
        color: rgba(255,255,255,.6);
      }
      .nav-row .name { pointer-events: none; }
      .nav-row input {
        width: 100%;
        height: 100%;
        padding: 0;
        border: none;
        font: inherit;
        background-color: inherit;
        color: inherit;
        outline: 1px solid rgba(255,255,255,.3);
      }

      /* ---- scrollable data ---- */
      .scroll-wrap {
        min-width: 0;
        flex: 1 1 auto;
        overflow-x: auto;
        overflow-y: hidden;
        scroll-snap-type: x mandatory;
        scroll-behavior: smooth;
      }
      .scroll-wrap::-webkit-scrollbar { height: 6px; }
      .scroll-wrap::-webkit-scrollbar-track { background: rgba(0,0,0,.1); border-radius: 3px; }
      .scroll-wrap::-webkit-scrollbar-thumb { background: rgba(255,255,255,.25); border-radius: 3px; }
      .scroll-wrap::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,.4); }

      .data-row.section { font-weight: 600; }
      .data-row.extended { font-size: 12px; color: rgba(255,255,255,.7); }
      .data-row {
        display: flex;
        height: 28px;
        line-height: 28px;
        border-bottom: 1px solid rgba(255,255,255,.06);
        transition: background-color .1s;
      }
      .data-row:hover { background-color: rgba(255,255,255,.03); }
      .data-row:last-child { border-bottom: none; }
      .data-row.header { color: rgba(255,255,255,.3); font-size: 11px; cursor: default; }
      .data-row.header:hover { background-color: transparent; }
      .data-row.total { font-weight: 600; border-top: 1px solid rgba(255,255,255,.15) !important; }

      ol {
        display: flex;
        margin: 0;
        padding: 0;
        list-style: none;
        flex-shrink: 0;
      }
      li {
        flex-shrink: 0;
        width: 40px;
        min-width: 40px;
        margin: 0 5px;
        text-align: right;
        padding: 0 2px;
        font-size: 12px;
        scroll-snap-align: start;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: clip;
      }
      .header li {
        text-align: center;
        font-size: 11px;
      }
      .header .year-label {
        font-size: 12px;
        color: rgba(255,255,255,.5);
      }
      .data-row input {
        width: 100%;
        height: 100%;
        padding: 0;
        border: none;
        font: inherit;
        background-color: inherit;
        color: inherit;
        text-align: end;
      }
      button.extended, button.total {
        visibility: hidden;
      }

      /* ---- stats column ---- */
      .stats-col {
        flex: 0 0 170px;
        min-width: 170px;
        border-left: 1px solid rgba(255,255,255,.1);
      }
      .stat-row {
        height: 28px; line-height: 28px;
        border-bottom: 1px solid rgba(255,255,255,.06);
        display: flex; align-items: center; gap: 6px;
        padding: 0 8px;
        font-size: 10px;
        transition: background-color .1s;
      }
      .stat-row:hover { background-color: rgba(255,255,255,.03); }
      .stat-row:last-child { border-bottom: none; }
      .stat-row.header {
        color: rgba(255,255,255,.3);
        justify-content: center;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: .5px;
        cursor: default;
      }
      .stat-row.header:hover { background-color: transparent; }
      .stat-row.total { border-top: 1px solid rgba(255,255,255,.15) !important; font-weight: 600; }
      .stat-row canvas { flex-shrink: 0; border-radius: 2px; }
      .stat-label { color: rgba(255,255,255,.55); white-space: nowrap; }

      /* ---- summary panel ---- */
      .summary {
        margin-top: 20px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .summary-card {
        background: rgba(0,0,0,.15);
        border-radius: 4px;
        padding: 10px 14px;
      }
      .summary-card h4 { margin: 0 0 6px 0; font-size: 13px; color: rgba(255,255,255,.5); }
      .summary-card canvas { width: 100%; height: 80px; border-radius: 2px; }
      .chart-legend { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; font-size: 10px; }
      .year-bar { display: flex; gap: 4px; align-items: flex-end; height: 80px; }
      .year-bar-item {
        flex: 1;
        border-radius: 2px 2px 0 0;
        min-height: 4px;
        position: relative;
      }
      .year-bar-item:hover { opacity: .8; }
      .year-bar-item .bar-label {
        position: absolute;
        bottom: -16px;
        left: 50%; transform: translateX(-50%);
        font-size: 9px;
        color: rgba(255,255,255,.5);
        white-space: nowrap;
      }
    </style>

  </head>
  <body>
    <script src="bundle.js"></script>
  </body>
</html>
