<!doctype html>
<html>
<head>
  <title>BudgetSmuggler — Scroll PoC</title>
  <link rel="stylesheet" type="text/css" href="https://fonts.googleapis.com/css?family=Open+Sans" />
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: "Open Sans", sans-serif;
      background: #f6704b;
      margin: 0;
      padding: 40px;
    }
    .budget {
      display: inline-block;
      max-width: calc(100vw - 80px);
      background: #354b60;
      border-radius: 5px;
      color: #fff;
      padding: 14px;
      box-shadow: 0 0 40px 5px rgba(0,0,0,.4);
    }
    .title {
      background: #8e44ad;
      border-radius: 5px 5px 0 0;
      margin: -14px -14px 20px -14px;
      padding: 8px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 46px;
    }
    .title h3 { margin: 0; font-size: 24px; }
    .controls { display: flex; gap: 8px; }
    .controls button {
      background: rgba(255,255,255,.3);
      border: none;
      border-radius: 8px;
      height: 30px;
      width: 30px;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      font-size: 16px;
    }
    .controls button:hover { background: rgba(255,255,255,.5); }

    /* ---- body: fixed nav col + scrollable data col ---- */
    .table-body {
      display: flex;
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 4px;
    }

    /* ---- fixed nav column ---- */
    .nav-col {
      flex: 0 0 170px;
      min-width: 170px;
    }
    .nav-row {
      height: 28px;
      line-height: 28px;
      padding: 0 8px;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      border-bottom: 1px solid rgba(255,255,255,.08);
      border-right: 1px solid rgba(255,255,255,.1);
    }
    .nav-col .nav-row:last-child { border-bottom: none; }
    .nav-row.header { color: rgba(255,255,255,.35); font-size: 12px; }
    .nav-row.indent-cat { padding-left: 20px; }
    .nav-row.indent-ext { padding-left: 34px; }

    /* ---- scrollable data column ---- */
    .scroll-wrap {
      overflow-x: auto;
      overflow-y: hidden;
      scroll-snap-type: x mandatory;
      scroll-padding-left: 0px;
      scroll-behavior: smooth;
    }
    .scroll-wrap::-webkit-scrollbar { height: 6px; }
    .scroll-wrap::-webkit-scrollbar-thumb { background: rgba(255,255,255,.3); border-radius: 3px; }

    .data-row {
      display: flex;
      height: 28px;
      line-height: 28px;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .data-row:last-child { border-bottom: none; }
    .data-row.header { color: rgba(255,255,255,.35); }

    ol {
      display: flex;
      margin: 0;
      padding: 0;
      list-style: none;
      flex-shrink: 0;
    }
    li {
      flex-shrink: 0;
      width: 40px;
      min-width: 40px;
      margin: 0 5px;
      text-align: right;
      padding: 0 2px;
      font-size: 12px;
      scroll-snap-align: start;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: clip;
    }
    .header li {
      text-align: center;
      font-size: 11px;
    }
    .header .year-label {
      font-size: 12px;
      color: rgba(255,255,255,.5);
    }
  </style>
</head>
<body>

<div class='budget'>
  <div class='title'>
    <h3>BudgetSmuggler</h3>
    <div class='controls'>
      <button onclick='scrollStep(-1)'>B</button>
      <button onclick='scrollStep(1)'>F</button>
    </div>
  </div>
  <div class='table-body'>
    <div class='nav-col' id='navCol'></div>
    <div class='scroll-wrap' id='scrollWrap'></div>
  </div>
</div>

<script>
const TOTAL = 120
const STEP = 12
const COL_W = 50

const scrollStep = (dir) => {
  const el = document.getElementById('scrollWrap')
  el.scrollBy({ left: dir * STEP * COL_W, behavior: 'smooth' })
}

const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']
const baseYear = 2020
const startMonth = 0

const colToYear = (col) => baseYear + Math.floor((col + startMonth) / 12)

const rows = [
  { name: 'Income', depth: 0 },
  { name: '  Wages', depth: 1 },
  { name: '      Main Job', depth: 2 },
  { name: '      Side Gig', depth: 2 },
  { name: '  Investments', depth: 1 },
  { name: '      Dividends', depth: 2 },
  { name: '      Interest', depth: 2 },
  { name: 'Expenses', depth: 0 },
  { name: '  Housing', depth: 1 },
  { name: '      Rent', depth: 2 },
  { name: '      Utilities', depth: 2 },
  { name: '  Food', depth: 1 },
  { name: '      Groceries', depth: 2 },
  { name: '      Dining Out', depth: 2 },
  { name: '  Transport', depth: 1 },
  { name: '      Fuel', depth: 2 },
  { name: '      Insurance', depth: 2 },
]

const randomVal = () => Math.round(Math.random() * 500 + 50)
const makeValues = () => Array.from({ length: TOTAL }, () => randomVal())

const cellsLi = (values) =>
  values.map(v => `<li>${v}</li>`).join('')

// ---- build nav column ----
const navEl = document.getElementById('navCol')
let navHTML = ''
navHTML += `<div class='nav-row header'>Year</div>`
navHTML += `<div class='nav-row header'>Months</div>`
rows.forEach(r => {
  const cls = r.depth === 0 ? '' : r.depth === 1 ? 'indent-cat' : 'indent-ext'
  navHTML += `<div class='nav-row ${cls}'>${r.name}</div>`
})
navHTML += `<div class='nav-row' style='border-top:1px solid rgba(255,255,255,.1)'>Total</div>`
navEl.innerHTML = navHTML

// ---- build scrollable data column ----
const dataEl = document.getElementById('scrollWrap')
let dataHTML = ''

// Year row
let yearCells = []
let lastYear = null
for (let i = 0; i < TOTAL; i++) {
  const y = colToYear(i)
  yearCells.push(y !== lastYear ? `<li class='year-label'>${y}</li>` : `<li></li>`)
  lastYear = y
}
dataHTML += `<div class='data-row header'><ol>${yearCells.join('')}</ol></div>`

// Month row
const monthCells = Array.from({ length: TOTAL }, (_, i) =>
  `<li>${months[(i + startMonth) % 12]}</li>`
)
dataHTML += `<div class='data-row header'><ol>${monthCells.join('')}</ol></div>`

// Data rows
rows.forEach(r => {
  dataHTML += `<div class='data-row'><ol>${cellsLi(makeValues())}</ol></div>`
})

// Total row
const totalValues = makeValues()
dataHTML += `<div class='data-row' style='border-top:1px solid rgba(255,255,255,.1)'><ol>${cellsLi(totalValues)}</ol></div>`

dataEl.innerHTML = dataHTML
</script>
</body>
</html>
